<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#061018"/>
      <stop offset="55%" stop-color="#04050a"/>
      <stop offset="100%" stop-color="#02040a"/>
    </radialGradient>

    <linearGradient id="amberGlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFDDAA" stop-opacity="0.12"/>
      <stop offset="40%" stop-color="#FFB020" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#FF8C00" stop-opacity="0.06"/>
    </linearGradient>

    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="14" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="hardGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feComponentTransfer in="b">
        <feFuncA type="table" tableValues="0 0.6"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <linearGradient id="colMat" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#1b1f23"/>
      <stop offset="0.4" stop-color="#0b0f12"/>
      <stop offset="1" stop-color="#06070a"/>
    </linearGradient>

    <mask id="softMask">
      <rect x="0" y="0" width="1200" height="720" fill="white"/>
      <g transform="translate(0,40)">
        <rect x="160" y="180" width="880" height="420" rx="28" fill="black"/>
      </g>
    </mask>
  </defs>

  <!-- Background -->
  <rect width="1200" height="720" fill="url(#bgGrad)"/>

  <!-- Ambient glow rings -->
  <g opacity="0.35" filter="url(#softGlow)">
    <ellipse cx="240" cy="120" rx="160" ry="80" fill="#0b1220"/>
    <ellipse cx="980" cy="540" rx="220" ry="110" fill="#0b0b0b"/>
  </g>

  <!-- Main viewport panel -->
  <g transform="translate(120,100)">
    <rect x="0" y="0" width="960" height="480" rx="26" fill="#030511" opacity="0.45"/>
    <rect x="0" y="0" width="960" height="480" rx="26" fill="url(#amberGlow)" opacity="0.03"/>

    <!-- Perspective grid plate -->
    <g transform="translate(80,40) scale(0.92) skewX(-8)">
      <!-- base shadow -->
      <rect x="0" y="0" width="800" height="400" fill="#03030a" rx="18"/>

      <!-- columns (log bars) -->
      <g filter="url(#hardGlow)">
        <!-- create 4 rows x 8 cols -->
        <!-- we draw with varying heights to imply streaming activity -->
        <!-- loop simulated by hand-coded repeats for compactness -->

        <!-- Row 1 -->
        <g transform="translate(28,260)">
          <rect x="0" y="-160" width="28" height="160" rx="6" fill="url(#colMat)"/>
          <rect x="48" y="-120" width="28" height="120" rx="6" fill="url(#colMat)"/>
          <rect x="96" y="-88" width="28" height="88" rx="6" fill="url(#colMat)"/>
          <rect x="144" y="-176" width="28" height="176" rx="6" fill="url(#colMat)"/>
          <rect x="192" y="-64" width="28" height="64" rx="6" fill="url(#colMat)"/>
          <rect x="240" y="-140" width="28" height="140" rx="6" fill="url(#colMat)"/>
          <rect x="288" y="-100" width="28" height="100" rx="6" fill="url(#colMat)"/>
          <rect x="336" y="-132" width="28" height="132" rx="6" fill="url(#colMat)"/>
        </g>

        <!-- Row 2 -->
        <g transform="translate(28,220)">
          <rect x="0" y="-80" width="28" height="80" rx="6" fill="#0b0f12" opacity="0.86"/>
          <rect x="48" y="-112" width="28" height="112" rx="6" fill="#0b0f12" opacity="0.86"/>
          <rect x="96" y="-44" width="28" height="44" rx="6" fill="#0b0f12" opacity="0.86"/>
          <rect x="144" y="-148" width="28" height="148" rx="6" fill="#0b0f12" opacity="0.86"/>
          <rect x="192" y="-36" width="28" height="36" rx="6" fill="#0b0f12" opacity="0.86"/>
          <rect x="240" y="-96" width="28" height="96" rx="6" fill="#0b0f12" opacity="0.86"/>
          <rect x="288" y="-56" width="28" height="56" rx="6" fill="#0b0f12" opacity="0.86"/>
          <rect x="336" y="-72" width="28" height="72" rx="6" fill="#0b0f12" opacity="0.86"/>
        </g>

        <!-- Row 3 -->
        <g transform="translate(28,180)">
          <rect x="0" y="-120" width="28" height="120" rx="6" fill="#0b0f12" opacity="0.72"/>
          <rect x="48" y="-64" width="28" height="64" rx="6" fill="#0b0f12" opacity="0.72"/>
          <rect x="96" y="-92" width="28" height="92" rx="6" fill="#0b0f12" opacity="0.72"/>
          <rect x="144" y="-40" width="28" height="40" rx="6" fill="#0b0f12" opacity="0.72"/>
          <rect x="192" y="-150" width="28" height="150" rx="6" fill="#0b0f12" opacity="0.72"/>
          <rect x="240" y="-48" width="28" height="48" rx="6" fill="#0b0f12" opacity="0.72"/>
          <rect x="288" y="-128" width="28" height="128" rx="6" fill="#0b0f12" opacity="0.72"/>
          <rect x="336" y="-80" width="28" height="80" rx="6" fill="#0b0f12" opacity="0.72"/>
        </g>

        <!-- Row 4 -->
        <g transform="translate(28,140)">
          <rect x="0" y="-40" width="28" height="40" rx="6" fill="#0b0f12" opacity="0.58"/>
          <rect x="48" y="-96" width="28" height="96" rx="6" fill="#0b0f12" opacity="0.58"/>
          <rect x="96" y="-28" width="28" height="28" rx="6" fill="#0b0f12" opacity="0.58"/>
          <rect x="144" y="-136" width="28" height="136" rx="6" fill="#0b0f12" opacity="0.58"/>
          <rect x="192" y="-22" width="28" height="22" rx="6" fill="#0b0f12" opacity="0.58"/>
          <rect x="240" y="-84" width="28" height="84" rx="6" fill="#0b0f12" opacity="0.58"/>
          <rect x="288" y="-52" width="28" height="52" rx="6" fill="#0b0f12" opacity="0.58"/>
          <rect x="336" y="-108" width="28" height="108" rx="6" fill="#0b0f12" opacity="0.58"/>
        </g>

        <!-- highlights on some tops -->
        <g transform="translate(28,260)" opacity="0.9" fill="#FFB020">
          <rect x="144" y="-176" width="28" height="6" rx="3"/>
          <rect x="0" y="-160" width="28" height="6" rx="3"/>
          <rect x="240" y="-140" width="28" height="6" rx="3"/>
        </g>

      </g>

      <!-- flowing ribbons (simulating streaming log lines) -->
      <g transform="translate(40,48)" opacity="0.9">
        <path d="M40 320 C160 260, 420 260, 560 320" fill="none" stroke="#FFB020" stroke-opacity="0.08" stroke-width="10" stroke-linecap="round" filter="url(#softGlow)"/>
        <path d="M120 300 C260 260, 500 260, 660 300" fill="none" stroke="#FFB020" stroke-opacity="0.06" stroke-width="6" stroke-linecap="round"/>
        <path d="M200 340 C340 300, 580 300, 740 340" fill="none" stroke="#FFB020" stroke-opacity="0.05" stroke-width="8" stroke-linecap="round"/>
      </g>

      <!-- small terminal silhouettes / plates -->
      <g transform="translate(520,60) rotate(-6)">
        <rect x="0" y="0" width="220" height="28" rx="6" fill="#071022" opacity="0.95"/>
        <rect x="8" y="6" width="40" height="12" rx="3" fill="#FFB020" opacity="0.9"/>
        <rect x="58" y="6" width="140" height="12" rx="3" fill="#0b0f12" opacity="0.5"/>
      </g>

      <!-- subtle scanline overlay -->
      <g opacity="0.035" fill="#ffffff">
        <rect x="0" y="0" width="800" height="400"/>
      </g>

      <!-- panel frame glow -->
      <rect x="6" y="6" width="788" height="388" rx="16" fill="none" stroke="#FFB020" stroke-opacity="0.02"/>
    </g>

    <!-- HUD label -->
    <g transform="translate(36,12)">
      <rect x="0" y="0" width="240" height="38" rx="10" fill="#061018" opacity="0.7"/>
      <text x="24" y="24" fill="#FFB020" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700">Backend Log System • Live</text>
    </g>

  </g>

  <!-- outer vignette and finish -->
  <rect x="0" y="0" width="1200" height="720" fill="url(#bgGrad)" opacity="0.05"/>
</svg>
